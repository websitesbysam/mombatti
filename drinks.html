<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drinks Collection | Moमबत्ती</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Georgia, serif; background:#f8f2f5; color:#2a1020; line-height:1.6; }
    a { text-decoration:none; }
    img { display:block; width:100%; }
    .top-strip { background:#2a0719; color:#f8dce9; overflow:hidden; white-space:nowrap; }
    .top-strip-track { display:inline-block; padding:10px 0; animation:moveStrip 20s linear infinite; }
    @keyframes moveStrip { from { transform:translateX(0);} to { transform:translateX(-50%);} }
    .page-hero { background:linear-gradient(135deg,#3D0022,#5b1236,#210312); color:#fff7fb; padding:24px 7% 58px; }
    .navbar { display:flex; justify-content:space-between; align-items:center; gap:20px; margin-bottom:48px; }
    .logo { font-size:2rem; font-weight:700; }
    .nav-links { display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
    .nav-link { color:#f4d8e5; }
    .nav-btn, .back-btn, .order-btn { border-radius:999px; transition:0.3s ease; display:inline-block; }
    .nav-btn { padding:12px 22px; border:1px solid rgba(255,255,255,0.24); color:#fff; background:rgba(255,255,255,0.08); }
    .hero-grid { display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:center; }
    .hero-grid h1 { font-size:3.4rem; line-height:1.1; margin-bottom:16px; }
    .hero-grid p { color:#f5dde8; max-width:520px; }
    .hero-image { border-radius:28px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,0.24); }
    .hero-image img { height:440px; object-fit:cover; }
    .products { padding:82px 7%; }
    .section-title { font-size:2.2rem; color:#3D0022; margin-bottom:28px; }
    .product-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; }
    .product-card { background:#fff; border-radius:24px; overflow:hidden; box-shadow:0 16px 40px rgba(61,0,34,0.08); }
    .product-card img { height:260px; object-fit:cover; }
    .product-content { padding:20px; }
    .product-content h3 { font-size:1.22rem; color:#3D0022; margin-bottom:8px; }
    .product-content p { color:#604452; font-size:0.95rem; margin-bottom:16px; min-height:52px; }
    .order-btn { background:#3D0022; color:#fff; padding:11px 18px; }
    .order-btn:hover { background:#5f153b; }
    .footer-cta { padding:0 7% 80px; }
    .footer-box { background:linear-gradient(180deg,#f1dfe8,#ead4df); border-radius:28px; padding:36px; text-align:center; }
    .footer-box h2 { color:#3D0022; font-size:2rem; margin-bottom:10px; }
    .footer-box p { color:#624754; margin-bottom:18px; }
</html>
